name: Daily Beijing Restriction Reminder

on:
  schedule:
    - cron: '30 23 * * *'   # UTC 23:30 = 北京时间 7:30
  workflow_dispatch:        # 可选，允许手动触发测试

jobs:
  check-and-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run restriction check
        env:
          BARK_DEVICE_KEY: ${{ secrets.BARK_DEVICE_KEY }}
          PLATE_NUMBER: ${{ secrets.PLATE_NUMBER }}
        run: |
          python main.py

      - name: Send notification via Bark
        if: always()
        run: |
          curl -X POST "https://api.day.app/${{ secrets.BARK_DEVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"body": "限行提醒任务已完成"}'
