name: Daily Beijing Restriction Reminder

on:
  schedule:
    - cron: '0 20 * * *'   # UTC 20:00 = 北京时间 4:00（次日凌晨）
  workflow_dispatch:        # 允许手动触发

jobs:
  check-and-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run restriction check
        env:
          BARK_DEVICE_KEY: ${{ secrets.BARK_DEVICE_KEY }}
          PLATE_NUMBER: ${{ secrets.PLATE_NUMBER }}
        run: |
          python main.py
