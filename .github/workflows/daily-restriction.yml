name: Daily Beijing Restriction Reminder

on:
  schedule:
    - cron: '0 23 * * *'   # UTC 23:00 = 北京时间 07:00
  workflow_dispatch:        # 允许手动触发

jobs:
  check-and-alert:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run restriction check
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          PLATE_NUMBER: ${{ secrets.PLATE_NUMBER }}
        run: |
          python main.py
